name: Build authority packs

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # The pre-compiled NDL and Wikidata packs are stored in Git LFS.
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release assets
        run: npm run authoritypacks:release

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: authoritypacks-release
          path: release/packs-index.json

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release/*"
          generateReleaseNotes: true
          allowUpdates: true
          replacesArtifacts: true
